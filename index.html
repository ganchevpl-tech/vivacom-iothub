<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============= Zero Trust security headers ============= -->
    <!-- Content Security Policy: whitelist allowed sources -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https: ;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.tile.openstreetmap.org https://maps.googleapis.com https://*.googleapis.com https://flespi.io;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      upgrade-insecure-requests;
    " />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta name="permissions-policy" content="geolocation=(self), microphone=(), camera=(), payment=()" />

    <title>Vivacom IoT Dashboard | Enterprise Monitoring</title>
    <meta name="description" content="Enterprise IoT Dashboard for real-time monitoring, access control, and smart sensor management by Vivacom." />
    <meta name="author" content="Vivacom" />
    <meta name="theme-color" content="#FF6600" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vivacom IoT" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Vivacom IoT Dashboard" />
    <meta property="og:description" content="Enterprise IoT Dashboard for real-time monitoring and control" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vivacom IoT Dashboard" />
    <meta name="twitter:description" content="Enterprise IoT Dashboard for real-time monitoring and control" />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
